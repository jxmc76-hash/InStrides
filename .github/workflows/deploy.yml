name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          output=$(npx --yes firebase-tools@latest deploy --only hosting --project in-strides --token "$FIREBASE_TOKEN" 2>&1)
          code=$?
          echo "$output"
          if [ $code -ne 0 ] && echo "$output" | grep -q "is the current active version"; then
            echo "Already up to date — nothing new to release."
            exit 0
          fi
          exit $code
