<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>In Strides</title>
    
    <!-- iPhone App Settings -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="In Strides">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/sf-black-filled/128/007AFF/running.png">
    
    <!-- Added ?v=1 to force the phone to update the styles -->
    <link rel="stylesheet" href="style.css?v=1">
</head>
<body>
    <div class="app">
        <div class="project-header">
            <select id="projectSelect" onchange="window.handleProjectChange(this.value)">
                <option value="fast-5k">⚡️ Fast 5K</option>
                <option value="ADD_NEW">+ Add New Plan...</option>
            </select>
        </div>

        <div class="input-group">
            <input type="text" id="runInput" placeholder="Ex: 5k Intervals @w1" autocomplete="off">
            <button id="addBtn" onclick="window.addRun()">Add</button>
        </div>

        <div id="runList"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
