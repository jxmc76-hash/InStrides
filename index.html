<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In Strides</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

    <div class="app-modal">
        <div class="modal-content">
            
            <header class="app-header">
                <img src="logo.png" alt="Logo" class="app-logo">
                <h1 class="app-title">In Strides</h1>
            </header>

            <nav class="plan-navigator">
                <select id="projectSelect" class="plan-dropdown" onchange="window.handleProjectChange(this.value)"></select>
            </nav>

            <!-- Dynamic groups (Week 1, Week 2, etc.) injected here -->
            <div id="runList"></div>

            <div id="admin-ui" style="display:none;" class="admin-panel">
                <div class="admin-controls">
                    <input type="text" id="runInput" placeholder="New interval... @w1">
                    <button onclick="window.addRun()" class="btn-primary">Add</button>
                </div>
                <button onclick="window.restartProject()" class="btn-reset">Reset All Progress</button>
            </div>

        </div>
    </div>

    <!-- Floating Admin Lock -->
    <button onclick="window.openLogin()" id="admin-lock" class="floating-lock">🔒</button>

    <!-- Login Overlay -->
    <div id="login-overlay" class="overlay">
        <div class="login-modal">
            <h3>Admin Access</h3>
            <input type="password" id="pinInput" placeholder="PIN">
            <button onclick="window.checkPin()" class="btn-primary">Unlock</button>
            <button onclick="window.closeLogin()" class="btn-secondary">Cancel</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
