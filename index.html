<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In Strides</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg-light: #f4f4f4; /* New light background */
            --modal-bg: #FFFFFF;
            --orange-primary: #ff5500;
            --orange-pale: #fff5ee;
            --text-primary: #121212;
            --text-dim: #666666;
            --card-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; }

        body {
            background-color: var(--bg-light); /* Removed the black */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .app-modal {
            width: 100%;
            max-width: 480px;
            background: var(--modal-bg);
            border-radius: 32px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            margin-top: 20px;
        }

        .modal-content { padding: 40px 30px; }

        .app-header { text-align: center; margin-bottom: 30px; }

        .app-logo {
            width: 70px !important;
            height: auto;
            border-radius: 18px;
            margin-bottom: 12px;
        }

        .app-title {
            color: var(--text-primary);
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .strava-card.premium {
            background: var(--orange-pale);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 85, 0, 0.1);
            margin-bottom: 30px;
            text-align: left;
        }

        .strava-card h4 {
            margin: 0 0 8px 0;
            color: var(--orange-primary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
        }

        .strava-card h2 { margin: 0 0 15px 0; font-size: 1.4rem; color: var(--text-primary); line-height: 1.2;}

        .card-footer { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-dim); }

        .view-strava { color: var(--orange-primary); text-decoration: none; font-weight: 700; }

        .plan-navigator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 12px 18px;
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid #f0f0f0;
        }

        .plan-dropdown {
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            cursor: pointer;
        }

        .admin-button { background: none; border: none; cursor: pointer; opacity: 0.3; font-size: 1.1rem; }

        .section-title { 
            color: var(--orange-primary); 
            font-size: 0.8rem; 
            letter-spacing: 1.5px; 
            margin: 35px 0 15px 0; 
            text-align: left; 
            text-transform: uppercase;
            font-weight: 800;
        }

        .current-list { list-style: none; padding: 0; margin: 0; min-height: 10px; }

        .current-list li {
            background: #fff;
            margin-bottom: 12px;
            padding: 20px;
            border-radius: 18px;
            border: 1.5px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .current-list li.done { border-color: var(--orange-primary); }
        .current-list li.done .task-text { color: var(--orange-primary); }

        .task-text { font-size: 1.15rem; font-weight: 700; color: var(--text-primary); }
        .completion-date { font-size: 0.85rem; color: var(--orange-primary); display: block; margin-top: 4px; font-weight: 600;}

        .admin-panel { margin-top: 40px; border-top: 1px dashed #eee; padding-top: 20px; }
        .admin-controls { display: flex; gap: 10px; margin-bottom: 10px; }
        .admin-controls input { flex: 1; padding: 14px; border-radius: 12px; border: 1px solid #ddd; outline: none; font-size: 1rem;}
        .btn-primary { background: var(--orange-primary); color: white; border: none; padding: 10px 20px; border-radius: 12px; font-weight: 700; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(8px); }
        .login-modal { background: white; padding: 40px; border-radius: 24px; text-align: center; width: 340px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
        
        .sortable-ghost { opacity: 0.2; border: 2px dashed var(--orange-primary); transform: scale(0.95); }
        .delete-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 1.2rem; margin-left: 10px; transition: color 0.2s; }
        .delete-btn:hover { color: #ff0000; }
    </style>
</head>
<body>

    <div class="app-modal">
        <div class="modal-content">
            
            <header class="app-header">
                <img src="logo.png" alt="Logo" class="app-logo">
                <h1 class="app-title">In Strides</h1>
            </header>

            <section class="latest-run-hero"></section>

            <nav class="plan-navigator">
                <select id="projectSelect" class="plan-dropdown" onchange="window.handleProjectChange(this.value)"></select>
                <button onclick="window.openLogin()" id="admin-lock" class="admin-button">🔒</button>
            </nav>

            <!-- Container for grouped weeks -->
            <div id="runList"></div>

            <div id="admin-ui" style="display:none;" class="admin-panel">
                <div class="admin-controls">
                    <input type="text" id="runInput" placeholder="New interval... @w1">
                    <button onclick="window.addRun()" class="btn-primary">Add</button>
                </div>
                <div class="admin-actions">
                    <button onclick="window.restartProject()" style="width: 100%; background: #f0f0f0; border: none; padding: 12px; border-radius: 12px; color: #888; cursor: pointer; font-weight: 600;">Reset Progress</button>
                </div>
            </div>

        </div>
    </div>

    <div id="login-overlay" class="overlay">
        <div class="login-modal">
            <h3 style="margin-top:0">Admin Access</h3>
            <input type="password" id="pinInput" placeholder="PIN" style="width:100%; padding:15px; border-radius:12px; border:1px solid #ddd; margin-bottom:20px; text-align:center; font-size:1.5rem; letter-spacing:5px;">
            <button onclick="window.checkPin()" class="btn-primary" style="width:100%; padding:15px">Unlock</button>
            <button onclick="window.closeLogin()" style="background:none; border:none; color:#bbb; margin-top:15px; cursor:pointer;">Cancel</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
