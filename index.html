<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TempoTrack</title>
    <link rel="stylesheet" href="style.css">
    <!-- Drag and Drop Library -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="header-top">
                <select id="projectSelect" onchange="window.handleProjectChange(this.value)"></select>
                <button onclick="window.openLogin()" id="admin-lock">🔒</button>
            </div>
            
            <!-- Strava Feed Widget -->
            <div id="strava-content" class="strava-card"></div>
        </header>

        <main id="runList">
            <!-- Weeks and Runs injected here -->
        </main>

        <div id="admin-ui" style="display:none;">
            <div class="admin-controls">
                <input type="text" id="runInput" placeholder="Interval... @w1">
                <button onclick="window.addRun()">Add</button>
            </div>
            <div class="admin-actions">
                <button onclick="window.renameProject()">Rename</button>
                <button onclick="window.archiveCurrentProject()" id="archiveBtn">Archive</button>
                <button onclick="window.restartProject()">Reset Progress</button>
                <button onclick="window.deleteCurrentProject()" style="color:red;">Delete Plan</button>
            </div>
        </div>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h3>Admin Access</h3>
            <input type="password" id="pinInput" placeholder="Enter PIN">
            <button onclick="window.checkPin()">Unlock</button>
            <button onclick="window.closeLogin()">Cancel</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
