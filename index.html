<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Training Log</title>
    <link rel="stylesheet" href="style.css?v=60">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <div class="header-main">
                <h1 class="logo-text">TRAININGLOG<span>.CO.UK</span></h1>
                <div class="action-bar">
                    <button onclick="window.showTypeModal()" class="nav-btn btn-secondary">Types</button>
                    <button onclick="window.showInputModal()" class="nav-btn btn-primary">Add Entry</button>
                </div>
            </div>
        </header>

        <main class="content-area">
            <!-- New Stat Dashboard -->
            <div class="stats-bar" id="statsBar">
                <div class="stat-card">
                    <label>Consistency (7d)</label>
                    <div class="stat-val" id="statConsistency">0%</div>
                </div>
                <div class="stat-card">
                    <label>Avg Happiness</label>
                    <div class="stat-val" id="statMood">-</div>
                </div>
                <div class="stat-card">
                    <label>Top Intensity</label>
                    <div class="stat-val" id="statIntensity">-</div>
                </div>
            </div>

            <div class="matrix-container">
                <table class="modern-table">
                    <thead>
                        <tr id="headerRow">
                            <th class="col-date">Date</th>
                            <th class="col-happiness">Mood</th>
                        </tr>
                    </thead>
                    <tbody id="matrixBody"></tbody>
                </table>
            </div>
        </main>

        <!-- Entry Modal -->
        <div id="inputModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h2>Daily Log</h2>
                    <button onclick="window.closeModal('inputModal')" class="close-btn">✕</button>
                </div>
                <div class="form-body">
                    <div class="input-row"><label>Date</label><input type="date" id="modalDate"></div>
                    <div class="input-row happiness-box">
                        <label>Happiness (1-10)</label>
                        <div class="happiness-input-wrapper">
                            <input type="range" id="modalHappiness" min="1" max="10" step="1" oninput="document.getElementById('happyVal').innerText = this.value">
                            <span id="happyVal" class="score-display">5</span>
                        </div>
                    </div>
                    <div class="input-row"><label>Category</label><select id="modalType"></select></div>
                    <div class="input-row"><label>Notes</label><textarea id="modalDetails" rows="3"></textarea></div>
                    <div class="input-row">
                        <label>Intensity</label>
                        <div class="rating-strip">
                            <button class="rate-btn" data-val="1" onclick="window.selectMark(1)">EASY</button>
                            <button class="rate-btn" data-val="2" onclick="window.selectMark(2)">MED</button>
                            <button class="rate-btn" data-val="3" onclick="window.selectMark(3)">HARD</button>
                        </div>
                    </div>
                    <button onclick="window.saveExercise()" class="btn-submit">Save Day</button>
                    <button id="deleteEntryBtn" onclick="window.deleteEntry()" class="btn-delete" style="display:none; margin-top:10px;">Delete</button>
                </div>
            </div>
        </div>

        <!-- Types Modal -->
        <div id="typeModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header"><h2>Categories</h2><button onclick="window.closeModal('typeModal')" class="close-btn">✕</button></div>
                <div class="form-body">
                    <div id="typeList" class="type-editor-list"></div>
                    <div class="add-type-footer">
                        <input type="text" id="newTypeInput" placeholder="Add New...">
                        <button onclick="window.addType()" class="btn-submit" style="padding:10px;">Add</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=60"></script>
</body>
</html>
