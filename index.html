<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Training Log</title>
    <!-- Load Chart.js FIRST -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css?v=35">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <div class="header-main">
                <h1 class="logo-text">TRAININGLOG<span>.CO.UK</span></h1>
                <div class="action-bar">
                    <button onclick="window.showTypeModal()" class="nav-btn btn-secondary">Manage Types</button>
                    <button onclick="window.showInputModal()" class="nav-btn btn-primary">Add Exercise</button>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div class="chart-container">
                <!-- Ensure this ID is exactly 'happinessChart' -->
                <canvas id="happinessChart"></canvas>
            </div>

            <div class="matrix-container">
                <table class="modern-table">
                    <thead>
                        <tr id="headerRow">
                            <th class="col-date">Date</th>
                            <th class="col-happiness">Happiness</th>
                        </tr>
                    </thead>
                    <tbody id="matrixBody"></tbody>
                </table>
            </div>
        </main>

        <!-- Modals (Kept same as v34) -->
        <div id="inputModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h2>Daily Log</h2>
                    <button onclick="window.closeModal('inputModal')" class="close-btn">✕</button>
                </div>
                <div class="form-body">
                    <div class="input-row">
                        <label>Date</label>
                        <input type="date" id="modalDate">
                    </div>
                    <div class="input-row happiness-box">
                        <label>Daily Happiness</label>
                        <div class="happiness-input-wrapper">
                            <input type="range" id="modalHappiness" min="1" max="10" step="1" oninput="document.getElementById('happyVal').innerText = this.value">
                            <span id="happyVal" class="score-display">5</span>
                        </div>
                    </div>
                    <div class="input-row">
                        <label>Exercise Category</label>
                        <select id="modalType"></select>
                    </div>
                    <div class="input-row">
                        <label>Workout Notes</label>
                        <textarea id="modalDetails" rows="4"></textarea>
                    </div>
                    <div class="input-row">
                        <label>Intensity</label>
                        <div class="rating-strip">
                            <button class="rate-btn" data-val="1" onclick="window.selectMark(1)">EASY</button>
                            <button class="rate-btn" data-val="2" onclick="window.selectMark(2)">MED</button>
                            <button class="rate-btn" data-val="3" onclick="window.selectMark(3)">HARD</button>
                        </div>
                    </div>
                    <button id="submitEntryBtn" onclick="window.saveExercise()" class="btn-submit">Save Workout</button>
                    <button id="deleteEntryBtn" onclick="window.deleteEntry()" class="btn-delete" style="display:none; margin-top: 10px;">Delete Entry</button>
                </div>
            </div>
        </div>

        <div id="typeModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h2>Manage Categories</h2>
                    <button onclick="window.closeModal('typeModal')" class="close-btn">✕</button>
                </div>
                <div class="form-body">
                    <div id="typeList" class="type-editor-list"></div>
                    <div class="add-type-footer">
                        <input type="text" id="newTypeInput" placeholder="New Category">
                        <button onclick="window.addType()" class="btn-submit">Add</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=35"></script>
</body>
</html>
