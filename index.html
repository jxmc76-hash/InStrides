<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In Strides</title>
    <link rel="stylesheet" href="style.css?v=3">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

    <div class="app-modal">
        <div class="modal-content">
            <header class="app-header">
                <img src="logo.png" alt="Logo" class="app-logo">
                <h1 class="app-title">In Strides</h1>
            </header>

            <div class="activity-card">
                <span class="activity-label">LATEST ACTIVITY</span>
                <p>Loading Strava activity...</p>
            </div>

            <div class="project-management-zone">
                <nav class="plan-navigator">
                    <select id="projectSelect" class="plan-dropdown" onchange="window.handleProjectChange(this.value)"></select>
                </nav>

                <div class="plan-actions">
                    <button onclick="window.archiveProject()" class="btn-action">ARCHIVE</button>
                    <button onclick="window.restartProject()" class="btn-action">RESTART</button>
                    <button onclick="window.renameProject()" class="btn-action">RENAME</button>
                    <button onclick="window.deleteProject()" class="btn-action">DELETE</button>
                </div>

                <div class="archive-toggle">
                    <input type="checkbox" id="showArchived" onchange="window.syncDropdown()">
                    <label for="showArchived">Show archived plans</label>
                </div>
            </div>

            <div class="admin-controls-inline">
                <input type="text" id="runInput" placeholder="Ex: 5k intervals @w1">
                <button onclick="window.addRun()" class="btn-add">Add</button>
            </div>

            <div id="runList"></div>
        </div>
    </div>

    <script type="module" src="script.js?v=3"></script>
</body>
</html>
