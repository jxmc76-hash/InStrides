<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
    <title>In Strides</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="In Strides">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/sf-black-filled/128/007AFF/running.png">
    
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div class="app">
        <div class="project-header">
            <select id="projectSelect" onchange="window.handleProjectChange(this.value)">
                <option value="">Loading Plans...</option>
                <option value="ADD_NEW">+ Add New Plan...</option>
            </select>
        </div>

        <form class="input-group" onsubmit="event.preventDefault(); window.addRun();">
            <input type="text" id="runInput" placeholder="Ex: 5k Intervals @w1" autocomplete="off">
            <button type="submit" id="addBtn">Add</button>
        </form>

        <div id="runList"></div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
