<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In Strides</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --bg: #1a1a1a;
            --card: #242424;
            --primary: #ff5500;
            --text: #e0e0e0;
            --text-dim: #888;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            width: 80px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 10px;
        }

        .week-heading {
            color: var(--primary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 30px 0 10px 0;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            min-height: 20px;
        }

        li {
            background: var(--card);
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid transparent;
        }

        /* STRIKE THROUGH AND COLOR CHANGE FOR DONE */
        li.done {
            border-left: 4px solid var(--primary);
            opacity: 0.6;
        }

        li.done .task-text {
            text-decoration: line-through;
            color: var(--text-dim);
        }

        .task-text {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .completion-date {
            font-size: 0.8rem;
            color: var(--primary);
            display: block;
            margin-top: 4px;
        }

        .plan-nav {
            background: var(--card);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        select {
            background: transparent;
            color: white;
            border: none;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .admin-btn { background: none; border: none; cursor: pointer; filter: grayscale(1); }

        #admin-ui {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px dashed #444;
        }

        .input-group { display: flex; gap: 10px; }
        input { flex: 1; background: #333; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; }
        .btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: var(--card); padding: 30px; border-radius: 15px; text-align: center; }
        
        .delete-btn { color: #555; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.png" alt="Logo" class="logo">
            <h1>In Strides</h1>
        </header>

        <nav class="plan-nav">
            <select id="projectSelect" onchange="window.handleProjectChange(this.value)"></select>
            <button onclick="window.openLogin()" class="admin-btn">🔒</button>
        </nav>

        <div id="runList"></div>

        <div id="admin-ui" style="display:none;">
            <div class="input-group">
                <input type="text" id="runInput" placeholder="Interval... @w1">
                <button onclick="window.addRun()" class="btn">Add</button>
            </div>
            <button onclick="window.restartProject()" style="background:none; border:none; color:#666; margin-top:15px; cursor:pointer; width:100%;">Reset All Progress</button>
        </div>
    </div>

    <div id="login-overlay" class="overlay">
        <div class="modal">
            <h3>Admin Access</h3>
            <input type="password" id="pinInput" placeholder="PIN" style="text-align:center; font-size:1.5rem;">
            <br><br>
            <button onclick="window.checkPin()" class="btn">Unlock</button>
            <button onclick="window.closeLogin()" style="background:none; border:none; color:white; margin-left:10px;">Cancel</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
