<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Training Log</title>
    <link rel="stylesheet" href="style.css?v=25">
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <h1 class="logo-text">TRAININGLOG<span>.CO.UK</span></h1>
            
            <div class="action-bar">
                <button onclick="window.showTypeModal()" class="nav-btn btn-type">Manage Types</button>
                <button onclick="window.showInputModal()" class="nav-btn btn-add">Add Exercise</button>
                
                <div class="dropdown-wrapper">
                    <select id="logDropdown" class="nav-btn btn-log" onchange="window.handleLogSelect(this.value)">
                    </select>
                </div>

                <button onclick="window.addNewLog()" class="nav-btn btn-new">New Log</button>
                <button id="deleteLogBtn" onclick="window.deleteCurrentLog()" class="nav-btn btn-del">Delete Log</button>
            </div>
        </header>

        <div class="matrix-container">
            <table class="modern-table">
                <thead>
                    <tr id="headerRow">
                        <th>Week Starting</th>
                    </tr>
                </thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>

        <div id="inputModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h2 id="modalTitle">Log Entry</h2>
                    <button onclick="window.closeModal('inputModal')" class="close-btn">✕</button>
                </div>
                <div class="form-body">
                    <div class="input-row">
                        <label>Exercise Type</label>
                        <select id="modalType"></select>
                    </div>
                    <div class="input-row">
                        <label>Date</label>
                        <input type="date" id="modalDate">
                    </div>
                    <div class="input-row">
                        <label>Notes</label>
                        <textarea id="modalDetails" placeholder="How did it feel?"></textarea>
                    </div>
                    <div class="input-row">
                        <label>Intensity (1-3)</label>
                        <div class="rating-strip">
                            <button class="rate-btn" data-val="1" onclick="window.selectMark(1)">EASY</button>
                            <button class="rate-btn" data-val="2" onclick="window.selectMark(2)">MED</button>
                            <button class="rate-btn" data-val="3" onclick="window.selectMark(3)">HARD</button>
                        </div>
                    </div>
                    <div class="modal-footer-btns">
                        <button id="deleteEntryBtn" onclick="window.deleteEntry()" class="delete-btn" style="display:none;">Delete</button>
                        <button id="submitEntryBtn" onclick="window.saveExercise()" class="submit-btn">Save Workout</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="typeModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h2>Manage Types</h2>
                    <button onclick="window.closeModal('typeModal')" class="close-btn">✕</button>
                </div>
                <div class="form-body">
                    <div class="input-row">
                        <label>Current Types</label>
                        <div id="typeList" class="type-editor-list"></div>
                    </div>
                    <div class="input-row" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px;">
                        <label>Add New Type</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="newTypeInput" placeholder="e.g. CYCLING">
                            <button onclick="window.addType()" class="btn-add-inline">Add</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=25"></script>
</body>
</html>
