<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Training Log</title>
    <link rel="stylesheet" href="style.css?v=19">
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <h1 class="logo-text">TRAININGLOG<span>.CO.UK</span></h1>
            <div class="action-bar">
                <button onclick="window.manageTypes()" class="nav-btn btn-type">Add Type</button>
                <button onclick="window.showInputModal()" class="nav-btn btn-add">Add Exercise</button>
                <button onclick="window.changeLog()" class="nav-btn btn-log">Logs</button>
            </div>
            <div id="viewIndicator" class="view-indicator">Current Log: main-log</div>
        </header>

        <div class="matrix-container">
            <table class="modern-table">
                <thead>
                    <tr id="headerRow">
                        <th>Week Starting</th>
                    </tr>
                </thead>
                <tbody id="matrixBody"></tbody>
            </table>
        </div>

        <div id="inputModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h2 id="modalTitle">Log Entry</h2>
                    <button onclick="window.closeModal()" class="close-btn">✕</button>
                </div>
                
                <div class="form-body">
                    <div class="input-row">
                        <label>Exercise Type</label>
                        <select id="modalType"></select>
                    </div>
                    <div class="input-row">
                        <label>Date</label>
                        <input type="date" id="modalDate">
                    </div>
                    <div class="input-row">
                        <label>Notes</label>
                        <textarea id="modalDetails" placeholder="How did it feel?"></textarea>
                    </div>
                    <div class="input-row">
                        <label>Intensity (1-3)</label>
                        <div class="rating-strip">
                            <button class="rate-btn" data-val="1" onclick="window.selectMark(1)">EASY</button>
                            <button class="rate-btn" data-val="2" onclick="window.selectMark(2)">MED</button>
                            <button class="rate-btn" data-val="3" onclick="window.selectMark(3)">HARD</button>
                        </div>
                    </div>
                    <div class="modal-footer-btns">
                        <button id="deleteEntryBtn" onclick="window.deleteEntry()" class="delete-btn" style="display:none;">Delete</button>
                        <button id="submitEntryBtn" onclick="window.saveExercise()" class="submit-btn">Save Workout</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=19"></script>
</body>
</html>
