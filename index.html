<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Log</title>
    <link rel="stylesheet" href="style.css?v=14">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="logo">TRAININGLOG.CO.UK</h1>
            <div class="top-actions">
                <button onclick="window.manageTypes()" class="btn btn-red">ADD EX. TYPE</button>
                <button onclick="window.showInputModal()" class="btn btn-green">ADD EXERCISE</button>
                <button onclick="window.changeLog()" class="btn btn-orange">CHANGE LOG</button>
            </div>
        </header>

        <div class="matrix-wrapper">
            <table id="trainingMatrix">
                <thead>
                    <tr id="headerRow">
                        <th>WEEK</th>
                        </tr>
                </thead>
                <tbody id="matrixBody">
                    </tbody>
            </table>
        </div>

        <div id="inputModal" class="modal">
            <div class="modal-content">
                <h2>Exercise Input</h2>
                <div class="input-group">
                    <label>TYPE</label>
                    <select id="modalType"></select>
                </div>
                <div class="input-group">
                    <label>DATE</label>
                    <input type="date" id="modalDate">
                </div>
                <div class="input-group">
                    <label>DETAILS</label>
                    <textarea id="modalDetails" placeholder="Description..."></textarea>
                </div>
                <div class="input-group">
                    <label>MARK (1-3)</label>
                    <div class="mark-picker">
                        <button onclick="window.tempMark=1">Easy</button>
                        <button onclick="window.tempMark=2">Med</button>
                        <button onclick="window.tempMark=3">Hard</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="window.saveExercise()" class="btn-save">SAVE ENTRY</button>
                    <button onclick="window.closeModal()">CANCEL</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js?v=14"></script>
</body>
</html>
