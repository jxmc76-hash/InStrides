<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In Strides</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

    <div class="app-modal">
        <div class="modal-content">
            
            <header class="app-header">
                <img src="logo.png" alt="In Strides Logo" class="app-logo"> <h1 class="app-title">In Strides</h1>
            </header>

            <section class="latest-run-hero">
                <div class="strava-card premium">
                    <h4>Latest Run</h4>
                    <h2>WWS Park Run (83/173)</h2>
                    <div class="card-footer">
                        <span class="run-date">Completed 18 Apr</span>
                        <a href="#" class="view-strava">View Strava →</a>
                    </div>
                </div>
            </section>

            <nav class="plan-navigator">
                <select id="projectSelect" class="plan-dropdown" onchange="window.handleProjectChange(this.value)"></select>
                <button onclick="window.openLogin()" id="admin-lock" class="admin-button">🔒</button>
            </nav>

            <section class="current-section">
                <h3 class="section-title">CURRENT</h3>
                
                <ul id="runList" class="current-list">
                    </ul>
            </section>

            <div id="admin-ui" style="display:none;" class="admin-panel">
                <div class="admin-controls">
                    <input type="text" id="runInput" placeholder="Interval... @w1">
                    <button onclick="window.addRun()" class="btn-primary">Add</button>
                </div>
                <div class="admin-actions">
                    <button onclick="window.renameProject()">Rename</button>
                    <button onclick="window.archiveCurrentProject()" id="archiveBtn">Archive</button>
                    <button onclick="window.restartProject()">Reset Progress</button>
                    <button onclick="window.deleteCurrentProject()" style="color:red;">Delete Plan</button>
                </div>
            </div>

        </div> </div> <div id="login-overlay" class="overlay">
        <div class="login-modal">
            <h3>Admin Access</h3>
            <input type="password" id="pinInput" placeholder="Enter PIN">
            <button onclick="window.checkPin()" class="btn-primary">Unlock</button>
            <button onclick="window.closeLogin()" class="btn-secondary">Cancel</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
