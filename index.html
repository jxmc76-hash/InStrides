<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>In Strides</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body>

    <div class="app-modal">
        <div class="modal-content">
            <header class="app-header">
                <img src="logo.png" alt="Logo" class="app-logo">
                <h1 class="app-title">In Strides</h1>
            </header>

            <nav class="plan-navigator">
                <select id="projectSelect" class="plan-dropdown" onchange="window.handleProjectChange(this.value)"></select>
            </nav>

            <div id="runList"></div>

            <!-- Admin UI is now always visible -->
            <div id="admin-ui" class="admin-panel">
                <div class="admin-controls">
                    <input type="text" id="runInput" placeholder="New interval... @w1">
                    <button onclick="window.addRun()" class="btn-primary">Add</button>
                </div>
                <button onclick="window.restartProject()" class="btn-reset">Reset All Progress</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
