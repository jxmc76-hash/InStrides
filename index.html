<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Training Log</title>
    <link rel="stylesheet" href="style.css?v=43">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>

    <div id="authOverlay" class="auth-overlay">
        <div class="auth-card">
            <h2>TRAININGLOG<span>.CO.UK</span></h2>
            <p>Sign in to access your personal secure matrix.</p>
            <div class="input-row">
                <label>Email Address</label>
                <input type="email" id="authEmail" placeholder="your@email.com">
            </div>
            <div class="input-row">
                <label>Password</label>
                <input type="password" id="authPassword" placeholder="••••••••">
            </div>
            <div class="auth-buttons">
                <button onclick="window.handleAuth('login')" class="btn-primary">Sign In</button>
                <button onclick="window.handleAuth('register')" class="btn-secondary">Create Account</button>
            </div>
            <div id="authError" class="auth-error"></div>
        </div>
    </div>

    <div class="app-shell">
        <header class="app-header">
            <div class="header-main">
                <h1 class="logo-text">TRAININGLOG<span>.CO.UK</span></h1>
                
                <nav class="tab-nav">
                    <button id="tabLog" class="tab-btn active" onclick="window.switchTab('log')">Daily Log</button>
                    <button id="tabInsights" class="tab-btn" onclick="window.switchTab('insights')">Advanced Insights</button>
                </nav>

                <div class="action-bar">
                    <button onclick="window.showMetricModal()" class="nav-btn btn-secondary">Custom Metrics</button>
                    <button onclick="window.showTypeModal()" class="nav-btn btn-secondary">Manage Types</button>
                    <button onclick="window.showInputModal()" class="nav-btn btn-primary">Log / Plan</button>
                    <button onclick="window.handleSignOut()" class="nav-btn btn-secondary" style="color: var(--text-muted);">Sign Out</button>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div id="viewLog" class="view-pane active">
                <div class="matrix-container">
                    <table class="modern-table">
                        <thead>
                            <tr id="headerRow">
                                <th class="col-date">Date</th>
                                <th class="col-stat">Happiness</th>
                                <th class="col-stat">Food</th>
                                <th class="col-stat">Web</th>
                                </tr>
                        </thead>
                        <tbody id="matrixBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="viewInsights" class="view-pane">
                <div class="insights-container">
                    <div class="advanced-story-banner">
                        <h3>Correlation Discoveries</h3>
                        <div id="correlationStories" class="story-stack">
                            <p class="neutral-msg">Logging data to synthesize statistical matches...</p>
                        </div>
                    </div>

                    <div class="insights-grid">
                        <div class="stat-card">
                            <label>Avg Happiness</label>
                            <div id="statHappy" class="stat-val">-</div>
                        </div>
                        <div class="stat-card">
                            <label>Food Success</label>
                            <div id="statFood" class="stat-val">-</div>
                        </div>
                        <div class="stat-card">
                            <label>Web Success</label>
                            <div id="statWeb" class="stat-val">-</div>
                        </div>
                        <div class="stat-card">
                            <label>Total Workouts</label>
                            <div id="statTotal" class="stat-val">-</div>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h3>Activity Performance Volume</h3>
                        <div id="activityChart" class="activity-bars"></div>
                    </div>
                </div>
            </div>
        </main>

        <div id="inputModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h2 id="modalTitle">Log Day / Plan</h2>
                    <button onclick="window.closeModal('inputModal')" class="close-btn">✕</button>
                </div>
                <div class="form-body">
                    <div class="input-row">
                        <label>Date</label>
                        <input type="date" id="modalDate">
                    </div>

                    <div class="input-row">
                        <label>Entry System Mode</label>
                        <div class="binary-strip">
                            <button id="stratDone" class="bin-btn active" onclick="window.setStrategy(false)">COMPLETED WORKOUT</button>
                            <button id="stratPlan" class="bin-btn" onclick="window.setStrategy(true)">PLAN UPCOMING</button>
                        </div>
                    </div>
                    
                    <div id="performanceMetrics">
                        <div class="input-row highlight-box">
                            <label>Daily Happiness (1-10)</label>
                            <div class="slider-row">
                                <input type="range" id="modalHappiness" min="1" max="10" step="1" oninput="document.getElementById('happyVal').innerText = this.value">
                                <span id="happyVal" class="score-display">5</span>
                            </div>
                        </div>

                        <div class="toggle-container">
                            <div class="input-row">
                                <label>Healthy Food?</label>
                                <div class="binary-strip">
                                    <button id="foodYes" class="bin-btn" onclick="window.toggleBin('food', true)">YES</button>
                                    <button id="foodNo" class="bin-btn active" onclick="window.toggleBin('food', false)">NO</button>
                                </div>
                            </div>
                            <div class="input-row">
                                <label>Internet Control?</label>
                                <div class="binary-strip">
                                    <button id="webYes" class="bin-btn" onclick="window.toggleBin('web', true)">YES</button>
                                    <button id="webNo" class="bin-btn active" onclick="window.toggleBin('web', false)">NO</button>
                                </div>
                            </div>
                        </div>

                        <div id="customMetricsFormContainer"></div>
                    </div>

                    <div class="input-row">
                        <label>Exercise Category</label>
                        <select id="modalType"></select>
                    </div>

                    <div class="input-row">
                        <label>Workout Notes / Strategy</label>
                        <textarea id="modalDetails" rows="2" placeholder="Notes..."></textarea>
                    </div>

                    <div class="input-row" id="intensityRow">
                        <label>Intensity Level</label>
                        <div class="rating-strip">
                            <button class="rate-btn" data-val="1" onclick="window.selectMark(1)">EASY</button>
                            <button class="rate-btn" data-val="2" onclick="window.selectMark(2)">MED</button>
                            <button class="rate-btn" data-val="3" onclick="window.selectMark(3)">HARD</button>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button id="deleteEntryBtn" onclick="window.deleteEntry()" class="btn-delete" style="display:none;">Delete</button>
                        <button id="submitEntryBtn" onclick="window.saveExercise()" class="btn-submit">Save Entry</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="metricModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h2>Custom Metrics Setup</h2>
                    <button onclick="window.closeModal('metricModal')" class="close-btn">✕</button>
                </div>
                <div class="form-body">
                    <div id="metricList" class="type-editor-list"></div>
                    <div class="add-type-footer" style="flex-direction: column; gap:12px;">
                        <input type="text" id="newMetricName" placeholder="Metric Name (e.g., SLEEP, WEIGHT)">
                        <select id="newMetricType">
                            <option value="binary">Yes / No Toggle</option>
                            <option value="slider">1 - 10 Scale Slider</option>
                        </select>
                        <button onclick="window.addCustomMetric()" class="btn-submit">Add Custom Metric</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="typeModal" class="modal-overlay">
            <div class="modal-card">
                <div class="modal-header">
                    <h2>Manage Categories</h2>
                    <button onclick="window.closeModal('typeModal')" class="close-btn">✕</button>
                </div>
                <div class="form-body">
                    <div id="typeList" class="type-editor-list"></div>
                    <div class="add-type-footer">
                        <input type="text" id="newTypeInput" placeholder="New Category">
                        <button onclick="window.addType()" class="btn-submit">Add</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js?v=43"></script>
</body>
</html>
