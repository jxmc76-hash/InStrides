<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Connecting Strava...</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8f7f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 24px; padding: 40px; text-align: center; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { font-weight: 900; font-size: 1.4rem; margin-bottom: 10px; }
        p  { color: #8a8a8a; font-size: 0.9rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f1f5f9; border-top-color: #ff5500; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <h2>TRAININGLOG<span style="color:#ff5500">.APP</span></h2>
    <div class="spinner"></div>
    <p id="msg">Connecting your Strava account...</p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

const firebaseConfig = {
    apiKey: "AIzaSyC_VBffGyCoopsZZiPTZowx8d7fhFQ8_-w",
    authDomain: "in-strides.firebaseapp.com",
    projectId: "in-strides",
    storageBucket: "in-strides.firebasestorage.app",
    messagingSenderId: "974987405170",
    appId: "1:974987405170:web:c1f100b44bb85efed7dfeb"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const fns  = getFunctions(app);
const msg  = document.getElementById('msg');

const code  = new URLSearchParams(window.location.search).get('code');
const error = new URLSearchParams(window.location.search).get('error');

if (error || !code) {
    msg.textContent = 'Strava connection cancelled.';
    setTimeout(() => window.location.href = '/', 2000);
} else {
    onAuthStateChanged(auth, async (user) => {
        if (!user) {
            msg.textContent = 'Please sign in to TrainingLog first, then reconnect Strava.';
            setTimeout(() => window.location.href = '/', 3000);
            return;
        }
        try {
            const exchange = httpsCallable(fns, 'stravaExchange');
            const result   = await exchange({ code });
            msg.textContent = `✓ Connected as ${result.data.athlete_name}! Redirecting...`;
            setTimeout(() => window.location.href = '/', 2000);
        } catch (e) {
            msg.textContent = `Error: ${e.message}`;
        }
    });
}
</script>
</body>
</html>
